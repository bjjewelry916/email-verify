<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galadon Email Verifier</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    #drop-zone {
      width: 500px;
      max-width: 90%;
      margin: auto;
      padding: 50px;
      border: 2px dashed #999;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }

    #drop-zone.hover {
      border-color: black;
      background: #fafafa;
    }

    #status {
      margin-top: 25px;
      font-size: 15px;
    }

    .download-links {
      margin-top: 20px;
    }

    .download-links a {
      display: inline-block;
      margin: 8px;
      padding: 10px 18px;
      background: black;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      margin-top: 60px;
      font-size: 13px;
    }

    footer a {
      color: black;
    }
  </style>
</head>

<body>

<h1>Upload Emails to Verify</h1>

<div id="drop-zone">
  Drop CSV here or click to upload
</div>

<input type="file" id="file-input" accept=".csv" hidden />

<div id="status"></div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const statusDiv = document.getElementById('status');

  dropZone.addEventListener('click', () => {
    fileInput.click();
  });

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('hover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('hover');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('hover');

    const file = e.dataTransfer.files[0];

    if (file) {
      uploadFile(file);
    }
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];

    if (file) {
      uploadFile(file);
    }
  });

  async function uploadFile(file) {
    statusDiv.innerHTML = `Uploading ${file.name}...`;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const response = await fetch('/api/verify', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const text = await response.text();
        statusDiv.innerHTML = `Error: ${text}`;
        return;
      }

      const blob = await response.blob();

      const text = await blob.text();

      const rows = text.trim().split('\n');
      const headers = rows[0];
      const dataRows = rows.slice(1);

      const validRows = [];
      const invalidRows = [];
      const riskyRows = [];
      const riskyInvalidRows = [];

      dataRows.forEach(row => {
        if (row.includes(',valid,')) {
          validRows.push(row);
        } else if (row.includes(',invalid,')) {
          invalidRows.push(row);
          riskyInvalidRows.push(row);
        } else if (row.includes(',risky,')) {
          riskyRows.push(row);
          riskyInvalidRows.push(row);
        }
      });

      function createDownload(data, filename) {
        const csvContent = [headers, ...data].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        return URL.createObjectURL(blob);
      }

      const allUrl = createDownload(dataRows, `all-${file.name}`);
      const validUrl = createDownload(validRows, `valid-${file.name}`);
      const invalidUrl = createDownload(invalidRows, `invalid-${file.name}`);
      const riskyUrl = createDownload(riskyRows, `risky-${file.name}`);
      const riskyInvalidUrl = createDownload(riskyInvalidRows, `risky-invalid-${file.name}`);

      statusDiv.innerHTML = `
        <p>Verification complete.</p>

        <div class="download-links">
          <a href="${allUrl}" download="all-${file.name}">
            Download All
          </a>

          <a href="${validUrl}" download="valid-${file.name}">
            Valid Emails
          </a>

          <a href="${invalidUrl}" download="invalid-${file.name}">
            Invalid Emails
          </a>

          <a href="${riskyUrl}" download="risky-${file.name}">
            Risky Emails
          </a>

          <a href="${riskyInvalidUrl}" download="risky-invalid-${file.name}">
            Risky + Invalid
          </a>
        </div>
      `;

    } catch (err) {
      console.error(err);
      statusDiv.innerHTML = `Something went wrong.`;
    }
  }
</script>

</body>
</html>
