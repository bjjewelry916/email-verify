<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Email Verifier</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 40px; background: #f5f5f5; }
    h1 { color: #333; }
    #drop-zone {
      border: 2px dashed #999;
      padding: 50px;
      width: 500px;
      max-width: 90%;
      margin: auto;
      background: #fff;
      cursor: pointer;
      border-radius: 12px;
      transition: border 0.3s;
    }
    #drop-zone.hover { border-color: #000; background: #fafafa; }
    
    #jobs { margin-top: 30px; }
    .job-block {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin: 15px auto;
      width: 500px;
      max-width: 90%;
      background: #fff;
      text-align: left;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .progress-container {
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin: 15px 0 10px 0;
      height: 20px;
    }
    .progress-bar {
      height: 100%;
      background: #4caf50;
      width: 0%;
      transition: width 0.3s;
    }
    .status, .log-line, .actions { font-size: 14px; color: #555; }
    .log-line { font-family: monospace; background: #f4f4f4; padding: 5px; border-radius: 4px; margin-top: 8px;}
    
    .actions a {
      color: #007aff;
      cursor: pointer;
      text-decoration: underline;
      margin-right: 10px;
    }
    .close-job {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 16px;
      color: #999;
      cursor: pointer;
    }
    .close-job:hover { color: #000; }
    .download-links { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;}
  </style>
</head>
<body>

  <h1>Bulk Email Verifier</h1>
  <div id="drop-zone">Drop CSV here or click to upload</div>
  <input type="file" id="file-input" accept=".csv" style="display:none;">
  
  <div id="jobs"></div>

  <script>
    // NOTE: Change this to your Railway URL when deploying (e.g. "https://your-domain.up.railway.app")
    const API_BASE = "https://email-verify-y3f6.onrender.com"; 

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const jobsContainer = document.getElementById('jobs');

    let jobList = JSON.parse(localStorage.getItem('verifier-jobs') || '[]');
    jobList.forEach(({ job_id, fileName }) => createJobBlock(job_id, fileName));

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      handleFile(e.dataTransfer.files[0]);
    });
    
    fileInput.addEventListener('change', () => {
        if(fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if(!file.name.endsWith('.csv')){
          alert("Please upload a CSV file.");
          return;
      }

      const formData = new FormData();
      formData.append('file', file);

      fetch(`${API_BASE}/verify`, {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if(data.error) {
            alert(data.error);
            return;
        }
        jobList.push({ job_id: data.job_id, fileName: file.name });
        localStorage.setItem('verifier-jobs', JSON.stringify(jobList));
        createJobBlock(data.job_id, file.name);
      })
      .catch(err => alert("Failed to connect to the server."));
    }

    function createJobBlock(job_id, fileName) {
      const block = document.createElement('div');
      block.className = 'job-block';
      block.innerHTML = `
        <div class="close-job">✖</div>
        <div style="font-size: 16px;"><strong>${fileName}</strong></div>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <div class="status">Initializing...</div>
        <div class="log-line">Waiting for logs...</div>
        <div class="actions" style="margin-top: 10px;"><a class="cancel">Cancel Processing</a></div>
      `;
      jobsContainer.prepend(block);

      const bar = block.querySelector('.progress-bar');
      const status = block.querySelector('.status');
      const logLine = block.querySelector('.log-line');
      const cancelBtn = block.querySelector('.cancel');
      const actions = block.querySelector('.actions');
      const closeBtn = block.querySelector('.close-job');

      let canceled = false;

      const removeJob = () => {
        block.remove();
        jobList = jobList.filter(j => j.job_id !== job_id);
        localStorage.setItem('verifier-jobs', JSON.stringify(jobList));
      };

      cancelBtn.onclick = () => {
        canceled = true;
        fetch(`${API_BASE}/cancel?job_id=${job_id}`, { method: 'POST' });
        status.innerText = `Canceled`;
        bar.style.background = '#f44336';
        actions.innerHTML = '';
      };

      closeBtn.onclick = () => {
        fetch(`${API_BASE}/cancel?job_id=${job_id}`, { method: 'POST' });
        removeJob();
      };

      // Poll Progress
      const poll = setInterval(() => {
        if (canceled) return clearInterval(poll);

        fetch(`${API_BASE}/progress?job_id=${job_id}`)
          .then(res => res.json())
          .then(data => {
            bar.style.width = `${data.percent}%`;
            status.innerText = `${data.percent}% Complete — (Row ${data.row} of ${data.total})`;
            
            if (data.percent >= 100 || data.row === data.total) {
                clearInterval(poll);
                clearInterval(logPoll);
                actions.innerHTML = `
                    <div class="download-links">
                        <strong style="display:block; margin-bottom:10px;">⬇️ Download Results:</strong>
                        <a href="${API_BASE}/download?job_id=${job_id}&type=all" target="_blank">All Leads</a> | 
                        <a href="${API_BASE}/download?job_id=${job_id}&type=valid" target="_blank">Valid Only</a> <br><br>
                        <a href="${API_BASE}/download?job_id=${job_id}&type=risky" target="_blank">Risky Only</a> | 
                        <a href="${API_BASE}/download?job_id=${job_id}&type=risky_invalid" target="_blank">Risky & Invalid</a>
                    </div>
                `;
            }
          }).catch(() => {
              // Ignore network blips during polling
          });
      }, 1000);

      // Poll Logs separately to keep UI responsive
      const logPoll = setInterval(() => {
          if(canceled) return clearInterval(logPoll);
          fetch(`${API_BASE}/log?job_id=${job_id}`)
            .then(res => res.text())
            .then(text => {
                if(text) logLine.innerText = text;
            });
      }, 800);
    }
  </script>
</body>
</html>
